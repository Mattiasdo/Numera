name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Share a minimal reproduction, code snippet, or steps.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Numorph version
      placeholder: 0.1.0
  - type: input
    id: react
    attributes:
      label: React version
      placeholder: 18.3.1 / 19.0.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, bundler, framework, or package manager details.
